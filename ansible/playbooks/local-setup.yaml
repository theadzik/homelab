- name: Configure local.
  hosts: localhost
  vars_files:
    - vars/local-common.yaml
  pre_tasks:
    - name: Ensure supported Linux distribution.
      ansible.builtin.assert:
        that:
          - ansible_facts["distribution"] | lower in ["ubuntu", "fedora"]
        fail_msg: "This playbook supports Ubuntu and Fedora only."
      tags:
        - always
    - name: Upgrade system with apt.
      become: true
      ansible.builtin.apt:
        upgrade: true
        cache_valid_time: 3600
      when: ansible_facts["distribution"] | lower == "ubuntu"
      tags:
        - always
    - name: Upgrade system with dnf.
      become: true
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_only: true
      when: ansible_facts["distribution"] | lower == "fedora"
      tags:
        - always
    - name: Ensure packages are updated.
      ansible.builtin.package:
        name: "{{ common_packages[ansible_facts['distribution'] | lower] }}"
        state: latest
      become: true
      tags:
        - always
    - name: Ensure fonts-powerline are updated.
      ansible.builtin.package:
        name: "{{ powerline_font_package[ansible_facts['distribution'] | lower] }}"
        state: latest
      become: true
      tags:
        - always
    - name: Ensure ansible download location.
      ansible.builtin.file:
        path: "{{ downloads_dir }}"
        state: directory
      tags:
        - always
    - name: Ensure brew is installed.
      ansible.builtin.command: >
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      args:
        creates: /home/linuxbrew/.linuxbrew/bin/brew
      tags:
        - always
  roles:
    - role: general
      tags:
        - always
    - role: wsl
      tags:
        - wsl
    - role: oh-my-zsh
      tags:
        - always
    - role: git
      tags:
        - always
    - role: k8s-tools
      tags:
        - always
    - role: docker
      tags:
        - always
    - role: node
      tags:
        - always
    - role: vscode
      tags:
        - always
