- name: Configure local.
  hosts: localhost
  vars_files:
    - vars/local-common.yaml
  pre_tasks:
    - name: Upgrade system with apt.
      become: true
      ansible.builtin.apt:
        upgrade: true
        cache_valid_time: 3600
      tags:
        - always
    - name: Ensure packages are updated.
      ansible.builtin.apt:
        name: "{{ item }}"
        state: latest
      loop: "{{ common_packages }}"
      become: true
      tags:
        - always
    - name: Ensure fonts-powerline are updated.
      ansible.builtin.apt:
        name: fonts-powerline
        state: latest
      become: true
      tags:
        - ubuntu
    - name: Ensure ansible download location.
      ansible.builtin.file:
        path: "{{ downloads_dir }}"
        state: directory
      tags:
        - always
    - name: Ensure brew is installed.
      ansible.builtin.command: >
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      args:
        creates: /home/linuxbrew/.linuxbrew/bin/brew
      tags:
        - always
  roles:
    - role: general
      tags:
        - always
    - role: wsl
      tags:
        - wsl
    - role: oh-my-zsh
      tags:
        - always
    - role: git
      tags:
        - always
    - role: k8s-tools
      tags:
        - always
    - role: docker
      tags:
        - always
    - role: node
      tags:
        - always
    - role: vscode
      tags:
        - ubuntu
