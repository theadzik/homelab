- name: Ensure a package is present.
  ansible.builtin.apt:
    name: "{{ docker_apt_prerequisites }}"
    state: latest
  when: ansible_facts["distribution"] | lower == "ubuntu"
  become: true

- name: Ensure Fedora Docker prerequisites are installed.
  ansible.builtin.dnf:
    name: "{{ docker_dnf_prerequisites }}"
    state: latest
  when: ansible_facts["distribution"] | lower == "fedora"
  become: true

- name: Ensure directory for Docker's GPG key is present.
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: ansible_facts["distribution"] | lower == "ubuntu"
  become: true

- name: Ensure Docker's official GPG key is present.
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"
  when: ansible_facts["distribution"] | lower == "ubuntu"
  become: true

- name: Ensure Docker repository is added to apt.
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ arch_mapping[ansible_facts["architecture"]] | default(ansible_facts["architecture"]) }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ansible_facts["lsb"].codename }} stable
    filename: docker
    state: present
  when: ansible_facts["distribution"] | lower == "ubuntu"
  become: true

- name: Ensure Docker repository is added to dnf.
  ansible.builtin.yum_repository:
    name: docker-ce-stable
    description: Docker CE Stable - $basearch
    baseurl: https://download.docker.com/linux/fedora/$releasever/$basearch/stable
    gpgcheck: true
    gpgkey: https://download.docker.com/linux/fedora/gpg
    enabled: true
  when: ansible_facts["distribution"] | lower == "fedora"
  become: true

- name: Ensure Docker packages are installed.
  ansible.builtin.apt:
    name: "{{ docker_engine_packages }}"
    state: latest
    update_cache: true
  when: ansible_facts["distribution"] | lower == "ubuntu"
  become: true

- name: Ensure Docker packages are installed with dnf.
  ansible.builtin.dnf:
    name: "{{ docker_engine_packages }}"
    state: latest
    update_cache: true
  when: ansible_facts["distribution"] | lower == "fedora"
  become: true

- name: Ensure Docker group.
  ansible.builtin.group:
    name: docker
    state: present
  become: true

- name: Ensure user in Docker group.
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  become: true

- name: Ensure containerd image store is enabled.
  ansible.builtin.copy:
    src: "docker-daemon.json"
    dest: "/etc/docker/daemon.json"
    owner: root
    group: root
    mode: "0644"
  register: daemon
  become: true

- name: Restart Docker services.
  when: daemon.changed
  ansible.builtin.systemd:
    name: docker
    state: restarted
  become: true

- name: Ensure Docker services are running.
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - docker
    - containerd
  become: true
