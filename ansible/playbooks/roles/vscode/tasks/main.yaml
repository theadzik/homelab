- name: Ensure prerequisites are installed.
  ansible.builtin.apt:
    name:
      - apt-transport-https
    state: present
  when: ansible_facts["distribution"] | lower == "ubuntu"
  become: true

- name: Ensure directory for Microsoft GPG key is present.
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: ansible_facts["distribution"] | lower == "ubuntu"
  become: true

- name: Ensure Microsoft GPG key is present.
  ansible.builtin.get_url:
    url: "{{ vscode_gpg_url }}"
    dest: "{{ vscode_keyring_path }}"
    owner: root
    group: root
    mode: "0644"
  when: ansible_facts["distribution"] | lower == "ubuntu"
  become: true

- name: Ensure VS Code repository is added to apt.
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ vscode_arch_mapping.get(ansible_facts["architecture"], ansible_facts["architecture"]) }}
      signed-by={{ vscode_keyring_path }}]
      https://packages.microsoft.com/repos/code stable main
    filename: "{{ vscode_repo_file }}"
    state: present
  when: ansible_facts["distribution"] | lower == "ubuntu"
  become: true

- name: Ensure VS Code is installed on Ubuntu.
  ansible.builtin.apt:
    name: code
    state: latest
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts["distribution"] | lower == "ubuntu"
  become: true

- name: Ensure Microsoft signing key is imported for rpm.
  ansible.builtin.rpm_key:
    key: "{{ vscode_gpg_url }}"
    state: present
  when: ansible_facts["distribution"] | lower == "fedora"
  become: true

- name: Ensure VS Code repository is added to dnf.
  ansible.builtin.yum_repository:
    name: "{{ vscode_yum_repo_name }}"
    description: Visual Studio Code
    baseurl: https://packages.microsoft.com/yumrepos/vscode
    enabled: true
    gpgcheck: true
    gpgkey: "{{ vscode_gpg_url }}"
  when: ansible_facts["distribution"] | lower == "fedora"
  become: true

- name: Ensure VS Code is installed on Fedora.
  ansible.builtin.dnf:
    name: code
    state: latest
    update_cache: true
  when: ansible_facts["distribution"] | lower == "fedora"
  become: true
