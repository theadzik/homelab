version: 2
updates:
  - package-ecosystem: "pip"
    directories:
      - "/.github/scripts/sync-waves-inventory"
    schedule:
      interval: "weekly"
      day: "friday"
  - package-ecosystem: "docker"
    directories:
      - "/apps/custom-argocd"
    schedule:
      interval: "weekly"
      day: "friday"
    cooldown:
      default-days: 2
  - package-ecosystem: "docker"
    directories:
      - "/apps/vaultwarden/backup"
      - "/apps/vaultwarden/restore"
    schedule:
      interval: "weekly"
      day: "friday"
    cooldown:
      default-days: 2
    groups:
      vaultwarden-dockerfiles:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directories:
      - "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
    groups:
      github-actions:
        patterns:
          - "*"
