on:
  workflow_call:
    inputs:
      source-tag:
        required: true
        type: string
      docker-repo:
        required: true
        type: string
      context-path:
        required: true
        type: string
      docker-push:
        required: false
        type: boolean
        default: true
      docker-tag:
        required: false
        type: string
        default: "latest"

jobs:
  backup-build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        name: Checkout the tag
        with:
          ref: ${{ inputs.source-tag }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build only
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        if: ${{ ! inputs.docker-push }}
        with:
          platforms: "linux/amd64"
          context: "{{defaultContext}}:${{ inputs.context-path }}"
          push: false
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        if: ${{ inputs.docker-push }}
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        if: ${{ inputs.docker-push }}
        with:
          platforms: "linux/amd64"
          context: "{{defaultContext}}:${{ inputs.context-path }}"
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.docker-repo }}:${{inputs.docker-tag }}
