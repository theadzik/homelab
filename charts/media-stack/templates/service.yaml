{{- range $svcName, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $svcName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "media-stack.componentLabels" (dict "component" $svcName "context" $) | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "media-stack.selectorLabels" (dict "component" $svcName "context" $) | nindent 4 }}
  ports:
    - port: {{ $svc.port }}
      protocol: TCP
      targetPort: {{ $svc.port }}
      name: web
---
{{- end }}
{{- end }}
