admissionController:
  registerWebhook: false
  certGen:
    enabled: false
  certManager:
    enabled: true
    issuerRef:
      name: "lets-encrypt-prod"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
  image:
    tag: 1.7.0

recommender:
  replicas: 1
  podDisruptionBudget:
    enabled: false
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
  extraArgs:
    - --round-memory-bytes=1048576 # 1 MiB
  image:
    tag: 1.7.0

updater:
  replicas: 1
  podDisruptionBudget:
    enabled: false
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
  extraArgs:
    - --in-place-skip-disruption-budget=true
  image:
    tag: 1.7.0
