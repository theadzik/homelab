namespaceAnnotations:
  argocd.argoproj.io/sync-options: Delete=false,Prune=false
networkPolicy:
  enabled: false
  ingress:
  - from:
    - podSelector: {}
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: traefik
ingressClassName: traefik
ingressAnnotations:
  cert-manager.io/cluster-issuer: lets-encrypt-prod
ingressLabels:
  dns-type: internal
common:
  timezone: Europe/Warsaw
  puid: 1000
  pgid: 1000
  imagePullPolicy: IfNotPresent
priorityClassName: high-priority
persistentVolumeClaims:
  downloads:
    enabled: true
    accessModes:
    - ReadWriteMany
    storage: 7Ti
    storageClassName: synology-nfs-retain
    annotations:
      argocd.argoproj.io/sync-options: Delete=false,Prune=false
    labels:
      backup.velero.io/csi-snapshot: "true"
vpa:
  enabled: true
  updateMode: InPlaceOrRecreate
  minReplicas: 1
resourceClaimTemplate:
  enabled: true
  name: i915
  spec:
    devices:
      requests:
      - name: i915
        exactly:
          deviceClassName: gpu.intel.com
          allocationMode: ExactCount
          count: 1
services:
  jellyfin:
    enabled: true
    image: lscr.io/linuxserver/jellyfin
    tag: "10.11.11"
    port: 8096
    priorityClassName: high-priority
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
    env:
      HOSTNAME: jellyfin.zmuda.pro
    pvc:
      config:
        name: jellyfin-config-ssd
        storage: 10Gi
        storageClassName: synology-iscsi-retain-ssd
        accessModes:
        - ReadWriteOnce
        annotations:
          argocd.argoproj.io/sync-options: Delete=false,Prune=false
        labels:
          backup.velero.io/csi-snapshot: "true"
    livenessProbe:
      enabled: true
      type: httpGet
      path: /system/ping
      port: web
      initialDelaySeconds: 30
      periodSeconds: 30
    useGPU: true
    ingress:
      enabled: true
      host: jellyfin.zmuda.pro
      usePortName: true
      tls:
        enabled: true
        secretName: jellyfin-tls
      path: /
      pathType: Prefix
    vpa:
      updateMode: Initial
  radarr:
    enabled: true
    image: lscr.io/linuxserver/radarr
    tag: "6.3.0"
    port: 7878
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
    securityContext:
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsGroup: 1000
      runAsUser: 1000
    pvc:
      config:
        name: radarr-config-ssd
        storage: 2Gi
        storageClassName: synology-iscsi-retain-ssd
        accessModes:
        - ReadWriteOnce
        annotations:
          argocd.argoproj.io/sync-options: Delete=false,Prune=false
        labels:
          backup.velero.io/csi-snapshot: "true"
    livenessProbe:
      enabled: true
      type: httpGet
      path: /ping
      port: web
      initialDelaySeconds: 30
      periodSeconds: 30
    ingress:
      enabled: true
      host: radarr.zmuda.pro
      tls:
        enabled: true
        secretName: radarr-tls
      path: /
      pathType: Prefix
  sonarr:
    enabled: true
    image: lscr.io/linuxserver/sonarr
    tag: "4.0.19"
    port: 8989
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
    securityContext:
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsGroup: 1000
      runAsUser: 1000
    pvc:
      config:
        name: sonarr-config-ssd
        storage: 2Gi
        storageClassName: synology-iscsi-retain-ssd
        accessModes:
        - ReadWriteOnce
        annotations:
          argocd.argoproj.io/sync-options: Delete=false,Prune=false
        labels:
          backup.velero.io/csi-snapshot: "true"
    livenessProbe:
      enabled: true
      type: httpGet
      path: /ping
      port: web
      initialDelaySeconds: 30
      periodSeconds: 30
    ingress:
      enabled: true
      host: sonarr.zmuda.pro
      tls:
        enabled: true
        secretName: sonarr-tls
      path: /
      pathType: Prefix
  bazarr:
    enabled: true
    image: lscr.io/linuxserver/bazarr
    tag: "1.6.0"
    port: 6767
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
    securityContext:
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsGroup: 1000
      runAsUser: 1000
    pvc:
      config:
        name: bazarr-config-ssd
        storage: 2Gi
        storageClassName: synology-iscsi-retain-ssd
        accessModes:
        - ReadWriteOnce
        annotations:
          argocd.argoproj.io/sync-options: Delete=false,Prune=false
        labels:
          backup.velero.io/csi-snapshot: "true"
    livenessProbe:
      enabled: true
      type: httpGet
      path: /api/system/ping
      port: web
      initialDelaySeconds: 30
      periodSeconds: 30
    ingress:
      enabled: true
      host: bazarr.zmuda.pro
      tls:
        enabled: true
        secretName: bazarr-tls
      path: /
      pathType: Prefix
  nzbget:
    enabled: true
    image: lscr.io/linuxserver/nzbget
    tag: "26.2.20260724"
    port: 6789
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
    securityContext: null
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    pvc:
      config:
        name: nzbget-config-ssd
        storage: 5Gi
        storageClassName: synology-iscsi-retain-ssd
        accessModes:
        - ReadWriteOnce
        annotations:
          argocd.argoproj.io/sync-options: Delete=false,Prune=false
        labels:
          backup.velero.io/csi-snapshot: "true"
      intermediate:
        name: nzbget-intermediate
        storage: 128Gi
        storageClassName: synology-iscsi-delete-ssd
        accessModes:
        - ReadWriteOnce
        annotations:
          argocd.argoproj.io/sync-options: Delete=false,Prune=false
    existingSecretName: nzbget-secret
    livenessProbe:
      enabled: true
      type: tcpSocket
      port: web
      initialDelaySeconds: 30
      periodSeconds: 30
    ingress:
      enabled: true
      host: nzbget.zmuda.pro
      tls:
        enabled: true
        secretName: nzbget-tls
      path: /
      pathType: Prefix
