image:
  imagePullSecrets:
    - name: dockerhub-image-pull-secret

resources:
  requests:
    cpu: 500m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

metrics:
  enabled: false

kubectl:
  image:
    repository: docker.io/bitnamilegacy/kubectl
    tag: 1.33.4

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.12.0
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

configuration:
  features: EnableCSI
  backupStorageLocation:
    - name: garage
      provider: aws
      bucket: velero
      default: false
      accessMode: ReadWrite
      credential:
        name: s3-credentials
        key: garage
      config:
        region: garage
        s3ForcePathStyle: true
        s3Url: http://192.168.0.6:3900
        insecureSkipTLSVerify: true
  volumeSnapshotLocation:
    - name: default
      provider: csi

credentials:
  useSecret: true
  existingSecret: s3-credentials

backupsEnabled: true
snapshotsEnabled: true

schedules:
  cluster-full:
    disabled: false
    schedule: "0 0 * * *"
    useOwnerReferencesInBackup: false
    paused: false
    skipImmediately: false
    template:
      ttl: "720h"
      storageLocation: garage

  csi-opt-in-pvc-snapshots:
    disabled: false
    schedule: "0 */12 * * *"
    useOwnerReferencesInBackup: false
    paused: false
    skipImmediately: false
    template:
      ttl: "168h"
      storageLocation: garage
      snapshotVolumes: true
      defaultVolumesToFsBackup: false
      includedNamespaces:
        - "*"
      includedNamespaceScopedResources:
        - persistentvolumeclaims
      labelSelector:
        matchLabels:
          backup.velero.io/csi-snapshot: "true"
