apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: synology-csi
resources:
  - github.com/kubernetes-csi/external-snapshotter/client/config/crd?ref=v8.4.0
  - controller.yml
  - csi-driver.yml
  - external-service.yaml
  - namespace.yaml
  - node.yml
  - storage-class.yml
  - snapshotter/volume-snapshot-class.yml
  - snapshotter/snapshotter.yml
secretGenerator:
  - name: client-info-secret
    files:
      - client-info.yml=configs/client-info-secret.yml
images:
  - name: synology/synology-csi
    newTag: v1.3.0
  - name: registry.k8s.io/sig-storage/csi-node-driver-registrar
    newTag: v2.17.0
  - name: registry.k8s.io/sig-storage/csi-provisioner
    newTag: v6.3.0
  - name: registry.k8s.io/sig-storage/csi-attacher
    newTag: v4.12.0
  - name: registry.k8s.io/sig-storage/csi-resizer
    newTag: v2.2.1
  - name: registry.k8s.io/sig-storage/csi-snapshotter
    newTag: v4.2.1
