apiVersion: apps/v1
kind: Deployment
metadata:
  name: zmuda-pro-blog
  labels:
    app: zmuda-pro-blog
spec:
  template:
    spec:
      priorityClassName: high-priority
      imagePullSecrets:
        - name: dockerhub-image-pull-secret
      containers:
        - name: nginx
          image: theadzik/zmuda-pro-blog:2025.6.8
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: "TCP"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - mountPath: /var/cache/nginx
              name: cache
            - mountPath: /var/run
              name: run
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
      securityContext:
        runAsUser: 10003
        runAsGroup: 20003
        fsGroup: 20003
      volumes:
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
