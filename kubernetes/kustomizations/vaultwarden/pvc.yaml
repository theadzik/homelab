apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vaultwarden-data
  annotations:
    argocd.argoproj.io/sync-options: Delete=false,Prune=false
  labels:
    backup.velero.io/csi-snapshot: "true"
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  storageClassName: "synology-iscsi-retain"
