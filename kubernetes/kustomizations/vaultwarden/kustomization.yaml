apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vaultwarden
resources:
  - backup-cronjob.yaml
  - backup-pvc.yaml
  - deployment.yaml
  - ingress.yaml
  - namespace.yaml
  - netpol.yaml
  - pvc.yaml
  - service.yaml
  - ../image-pull-secret
secretGenerator:
  - name: vw-secrets
    envs:
      - configs/vw-config-secret.env
    type: Opaque
  - name: backup-encryption-secret
    envs:
      - configs/backup-encryption-secret.env
    type: Opaque
  - name: rclone-secret
    files:
      - .rclone.conf=configs/rclone-secret.conf
    type: Opaque
images:
  - name: vaultwarden/server
    newTag: 1.37.0-alpine
  - name: theadzik/vw-restore
    newTag: 2026.7.1
  - name: theadzik/vw-backup
    newTag: 2026.7.1
