apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vaultwarden-netpol
spec:
  endpointSelector:
    matchLabels:
      ingress: exposed
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
  egress:
    # Allow DNS resolution via kube-dns
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP

    # Allow SMTP to Proton Mail for email notifications (STARTTLS on 587)
    - toFQDNs:
        - matchName: smtp.protonmail.ch
      toPorts:
        - ports:
            - port: "587"
              protocol: TCP

    # Allow backup to Garage S3 on NAS (if backup feature enabled)
    - toCIDR:
        - 192.168.0.6/32
      toPorts:
        - ports:
            - port: "3900"
              protocol: TCP
