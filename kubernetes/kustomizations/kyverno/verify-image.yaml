apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: check-images
spec:
  evaluation:
    background:
      enabled: false
  validationActions:
    - Warn
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
  matchImageReferences:
    - glob: "theadzik/*"
  attestors:
    - name: cosign
      cosign:
        keyless:
          identities:
            - issuer: "https://token.actions.githubusercontent.com"
              subjectRegExp: "^https://github.com/theadzik/blog/.github/workflows/build-and-push.yaml@.+$"
  attestations:
    - name: sbom
      referrer:
        type: sbom/cyclone-dx
  validationConfigurations:
    mutateDigest: true
    required: true
    verifyDigest: true
  validations:
    - expression: >-
        images.containers.map(image, verifyImageSignatures(image, [attestors.cosign])).all(e, e > 0)
      message: failed to verify image with cosign cert
      # - expression: >-
      #     images.containers.map(image, extractPayload(image, attestations.sbom).bomFormat == 'CycloneDX').all(e, e)
      #   message: sbom is not a cyclone dx sbom
      # - expression: >-
      #     images.containers.map(image, verifyAttestationSignatures(image,
      #        attestations.sbom, [attestors.cosign])).all(e, e > 0)
      #   message: failed to verify attestation with cosign cert
