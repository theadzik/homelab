apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: blog
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - path: kubernetes/kustomizations/blog
      repoURL: "{{ .Values.spec.sources.repoURL }}"
      targetRevision: "{{ .Values.spec.sources.targetRevision }}"
  destination:
    server: https://kubernetes.default.svc
    namespace: blog
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
      refresh: true
    syncOptions:
      - PruneLast=true

---

apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: blog
spec:
  applicationRefs:
    - namePattern: "blog"
      writeBackConfig:
        method: "git"
      images:
        - alias: "zmuda-pro-blog"
          imageName: "theadzik/zmuda-pro-blog"
          commonUpdateSettings:
            updateStrategy: "semver"
            allowTags: "regexp:^[0-9]{4}\\.[0-9]{1,2}\\.[0-9]{1,2}\\.?[0-9]*$"
