apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: blog
spec:
  generators:
    - list:
        elements:
          - env: prod
          - env: dev
  template:
    metadata:
      name: "blog-{{.env}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - path: "kubernetes/kustomizations/blog/overlays/{{.env}}"
          repoURL: "{{ .Values.spec.sources.repoURL }}"
          targetRevision: "{{ .Values.spec.sources.targetRevision }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "blog-{{.env}}"
      syncPolicy:
        automated:
          enabled: true
          prune: true
          selfHeal: true
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
          refresh: true

---

apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: blog
spec:
  applicationRefs:
    - namePattern: "blog-dev"
      writeBackConfig:
        method: "git"
      images:
        - alias: "zmuda-pro-blog"
          imageName: "theadzik/zmuda-pro-blog"
          commonUpdateSettings:
            updateStrategy: "newest-build"
            allowTags: "regexp:^pr-[0-9]+$"
    - namePattern: "blog-prod"
      writeBackConfig:
        method: "git"
      images:
        - alias: "zmuda-pro-blog"
          imageName: "theadzik/zmuda-pro-blog"
          commonUpdateSettings:
            updateStrategy: "semver"
            allowTags: "regexp:^[0-9]{4}\\.[0-9]{1,2}\\.[0-9]{1,2}$"
