apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: media
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - path: charts/media-stack
      repoURL: {{ .Values.spec.sources.repoURL }}
      targetRevision: {{ .Values.spec.sources.targetRevision }}
      helm:
        releaseName: media
        valueFiles:
          - $repo/kubernetes/helm/media/values.yaml
    - path: kubernetes/kustomizations/media-secrets
      repoURL: {{ .Values.spec.sources.repoURL }}
      targetRevision: {{ .Values.spec.sources.targetRevision }}
      ref: repo
  destination:
    server: https://kubernetes.default.svc
    namespace: media
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    retry:
      limit: -1
    syncOptions:
      - PruneLast=true

---

apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: media
spec:
  namespace: argocd
  applicationRefs:
    - namePattern: "media"
      writeBackConfig:
        method: "git"
        gitConfig:
          writeBackTarget: "helmvalues:/kubernetes/helm/media/values.yaml"
      images:
        - alias: "jellyfin"
          imageName: "lscr.io/linuxserver/jellyfin:~10"
          manifestTargets:
            helm:
              name: "services.jellyfin.repository"
              tag: "services.jellyfin.tag"
          commonUpdateSettings:
            updateStrategy: "semver"
        - alias: "bazarr"
          imageName: "lscr.io/linuxserver/bazarr:~1"
          manifestTargets:
            helm:
              name: "services.bazarr.repository"
              tag: "services.bazarr.tag"
          commonUpdateSettings:
            updateStrategy: "semver"
        - alias: "radarr"
          imageName: "lscr.io/linuxserver/radarr:~6"
          manifestTargets:
            helm:
              name: "services.radarr.repository"
              tag: "services.radarr.tag"
          commonUpdateSettings:
            updateStrategy: "semver"
            allowTags: "regexp:^[0-9]+\\.[0-9]+\\.[0-9]+$"
        - alias: "sonarr"
          imageName: "lscr.io/linuxserver/sonarr:~4"
          manifestTargets:
            helm:
              name: "services.sonarr.repository"
              tag: "services.sonarr.tag"
          commonUpdateSettings:
            updateStrategy: "semver"
            allowTags: "regexp:^[0-9]+\\.[0-9]+\\.[0-9]+$"
        - alias: "nzbget"
          imageName: "lscr.io/linuxserver/nzbget:~26"
          manifestTargets:
            helm:
              name: "services.nzbget.repository"
              tag: "services.nzbget.tag"
          commonUpdateSettings:
            updateStrategy: "semver"
