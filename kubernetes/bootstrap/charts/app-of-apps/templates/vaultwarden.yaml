apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vaultwarden
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - path: kubernetes/kustomizations/vaultwarden
      repoURL: "{{ .Values.spec.sources.repoURL }}"
      targetRevision: "{{ .Values.spec.sources.targetRevision }}"
  destination:
    server: https://kubernetes.default.svc
    namespace: vaultwarden
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
      refresh: true

---

apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: vaultwarden
spec:
  applicationRefs:
    - namePattern: "vaultwarden"
      writeBackConfig:
        method: "git"
      images:
        - alias: "vaultwarden"
          imageName: "vaultwarden/server"
          commonUpdateSettings:
            updateStrategy: "semver"
            allowTags: "regexp:^(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)-alpine$"
        - alias: "restore"
          imageName: "theadzik/vw-restore"
          commonUpdateSettings:
            updateStrategy: "semver"
            allowTags: "regexp:^[0-9]{4}\\.([1-9]|1[0-2])\\.[1-9][0-9]*$"
        - alias: "backup"
          imageName: "theadzik/vw-backup"
          commonUpdateSettings:
            updateStrategy: "semver"
            allowTags: "regexp:^[0-9]{4}\\.([1-9]|1[0-2])\\.[1-9][0-9]*$"
